apiVersion: apps/v1
kind: Deployment
metadata:
  name: nzbdav
  namespace: arr
  labels:
    app.kubernetes.io/name: nzbdav
    app.kubernetes.io/part-of: arr
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nzbdav
      app.kubernetes.io/part-of: arr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nzbdav
        app.kubernetes.io/part-of: arr
    spec:
      containers:
        - name: nzbdav
          image: nzbdav/nzbdav:0.6.1
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - mountPath: /config
              name: config
            - mountPath: /media
              name: media
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: nzbdav
        - name: media
          persistentVolumeClaim:
            claimName: media-storage-pvc