apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex-media-server-exporter
  namespace: plex-media-server-exporter
  labels:
    app.kubernetes.io/name: plex-media-server-exporter
    app.kubernetes.io/component: metrics-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: plex-media-server-exporter
      app.kubernetes.io/component: metrics-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: plex-media-server-exporter
        app.kubernetes.io/component: metrics-exporter
    spec:
      containers:
        - name: plex-media-server-exporter
          image: ghcr.io/axsuul/plex-media-server-exporter:2.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "9594"
            - name: PLEX_ADDR
              value: http://192.168.86.122:32400
            - name: PLEX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: plex-media-server-exporter-secrets
                  key: PLEX_TOKEN
          ports:
            - name: metrics
              containerPort: 9594
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
