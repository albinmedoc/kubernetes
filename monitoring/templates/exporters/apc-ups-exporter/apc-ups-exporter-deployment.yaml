apiVersion: apps/v1
kind: Deployment
metadata:
  name: apc-ups-exporter
  namespace: apc-ups-exporter
  labels:
    app.kubernetes.io/name: apc-ups-exporter
    app.kubernetes.io/component: metrics-exportes
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: apc-ups-exporter
      app.kubernetes.io/component: metrics-exportes
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apc-ups-exporter
        app.kubernetes.io/component: metrics-exportes
    spec:
      containers:
        - name: apc-ups-exporter
          image: ghcr.io/viral32111/apc-ups-exporter:1.2.1-alpine
          imagePullPolicy: IfNotPresent
          args:
            - --nis-address
            - 192.168.86.106
            - --nis-port
            - "3551"
            - --metrics-address
            - 0.0.0.0
            - --metrics-port
            - "5000"
            - --metrics-path
            - /metrics
            - --metrics-interval
            - "15"
          ports:
            - name: metrics
              containerPort: 5000
              protocol: TCP
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "100m"
