apiVersion: v1
kind: ConfigMap
metadata:
  name: paperless-ngx-config
  namespace: paperless-ngx
  labels:
    app.kubernetes.io/name: paperless-ngx
    app.kubernetes.io/component: document-management
data:
  PAPERLESS_DBENGINE: postgresql
  PAPERLESS_URL: https://paperless.albinmedoc.se
  PAPERLESS_OCR_LANGUAGES: swe # OCR languages to install
  PAPERLESS_OCR_LANGUAGE: swe+eng # OCR languages to use
  PAPERLESS_TIME_ZONE: Europe/Stockholm
  PAPERLESS_CONSUMER_DISABLE: "1"
  PAPERLESS_TIKA_ENABLED: "1"
  PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://gotenberg.paperless-ngx.svc.cluster.local:3000
  PAPERLESS_TIKA_ENDPOINT: http://tika.paperless-ngx.svc.cluster.local:9998
